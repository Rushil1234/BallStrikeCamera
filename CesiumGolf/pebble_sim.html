<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pebble Beach — Simulator</title>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.121/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.121/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<style>
:root{
  --bg:#070d07;--panel:rgba(7,13,7,0.90);--border:rgba(255,255,255,0.07);
  --green:#3a9150;--lime:#5aba6e;--text:#e2ece2;--muted:rgba(190,215,190,0.45);
  --gold:#ffbd5a;--red:#ff6b6b;--r:8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;}
#cc{position:absolute;inset:0;}
.cesium-widget-credits,.cesium-credit-logoContainer,.cesium-credit-expand-link{display:none!important;}

/* ── top HUD ── */
#hud{
  position:absolute;top:0;left:0;right:0;height:56px;
  background:var(--panel);backdrop-filter:blur(20px) saturate(1.3);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:14px;z-index:100;
}
.hHole{font-size:24px;font-weight:800;color:var(--lime);letter-spacing:-1px;}
.hDiv{width:1px;height:24px;background:var(--border);}
.hName{font-size:14px;font-weight:700;color:var(--text);}
.hDesc{font-size:10px;color:var(--muted);margin-top:1px;}
.hSpc{flex:1;}
.hStat{text-align:right;}
.hSV{font-size:20px;font-weight:700;color:var(--text);line-height:1;}
.hSL{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}
.parB{font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;border:1px solid;white-space:nowrap;}
.par3{color:#6eb4ff;border-color:rgba(110,180,255,.3);background:rgba(110,180,255,.08);}
.par4{color:var(--lime);border-color:rgba(90,186,110,.3);background:rgba(58,145,80,.08);}
.par5{color:var(--gold);border-color:rgba(255,189,90,.3);background:rgba(255,189,90,.07);}

/* ── left hole list ── */
#holeList{
  position:absolute;top:0;left:0;bottom:0;width:60px;
  background:var(--panel);backdrop-filter:blur(20px);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:68px 0 10px;gap:2px;overflow-y:auto;z-index:99;
}
#holeList::-webkit-scrollbar{display:none;}
.hBtn{
  width:42px;height:42px;border-radius:var(--r);background:transparent;
  border:1px solid transparent;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1px;flex-shrink:0;transition:all .15s;
}
.hBtn:hover{background:rgba(255,255,255,.05);border-color:var(--border);}
.hBtn.active{background:rgba(58,145,80,.14);border-color:rgba(90,186,110,.4);}
.hNum{font-size:16px;font-weight:700;color:var(--text);}
.hBtn.active .hNum{color:var(--lime);}
.hPar{font-size:8px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);}
.hBtn.active .hPar{color:rgba(90,186,110,.7);}
.listDvd{width:28px;height:1px;background:var(--border);margin:2px 0;flex-shrink:0;}

/* ── bottom shot panel ── */
#shotPanel{
  position:absolute;bottom:0;left:60px;right:0;height:78px;
  background:var(--panel);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:18px;z-index:100;
}
#distBlock{min-width:80px;}
.dv{font-size:32px;font-weight:800;color:var(--text);line-height:1;}
.dl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.pDiv{width:1px;height:44px;background:var(--border);}

/* club row */
#clubRow{display:flex;align-items:center;gap:5px;flex:1;overflow-x:auto;padding:2px 0;}
#clubRow::-webkit-scrollbar{display:none;}
.cBtn{
  background:transparent;border:1px solid var(--border);border-radius:6px;
  color:var(--muted);font-size:11px;font-weight:600;padding:4px 9px;
  cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.cBtn:hover{color:var(--text);border-color:rgba(255,255,255,.15);}
.cBtn.sel{color:var(--gold);border-color:rgba(255,189,90,.45);background:rgba(255,189,90,.07);}
.cBtn.sug::after{content:'★';font-size:7px;color:var(--gold);margin-left:2px;vertical-align:super;}

/* action buttons */
.actBtn{
  border:none;border-radius:var(--r);font-size:14px;font-weight:800;
  padding:0 22px;height:48px;cursor:pointer;transition:all .15s;
  white-space:nowrap;letter-spacing:.3px;flex-shrink:0;
}
#swingBtn{background:var(--lime);color:#060d06;}
#swingBtn:hover{background:#70d285;}
#swingBtn:disabled{background:rgba(90,186,110,.2);color:var(--muted);cursor:not-allowed;}
#puttBtn{background:rgba(110,180,255,.15);border:1px solid rgba(110,180,255,.3);color:#6eb4ff;display:none;}
#puttBtn:hover{background:rgba(110,180,255,.25);}
#puttBtn:disabled{opacity:.4;cursor:not-allowed;}

/* ── flight info card (top-right during ball flight) ── */
#flightCard{
  position:absolute;top:68px;right:14px;
  background:var(--panel);backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:var(--r);
  padding:12px 16px;min-width:155px;z-index:100;
  display:none;animation:popIn .25s ease;
}
#flightCard.on{display:block;}

/* ── result popup ── */
#resultCard{
  position:absolute;top:68px;right:14px;
  background:var(--panel);backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:var(--r);
  padding:14px 18px;min-width:165px;z-index:100;
  display:none;animation:popIn .3s ease;
}
#resultCard.on{display:block;}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}

.cr{display:flex;justify-content:space-between;gap:16px;margin-bottom:5px;}
.cr:last-child{margin-bottom:0;}
.cl{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.cv{font-size:13px;font-weight:700;color:var(--text);}
.cSep{height:1px;background:var(--border);margin:8px 0;}
.rcLabel{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;}
.rcBig{font-size:32px;font-weight:800;color:var(--text);line-height:1;}
.rcUnit{font-size:11px;color:var(--muted);}

/* ── hole complete overlay ── */
#holeEnd{
  position:absolute;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(14px);
  display:none;align-items:center;justify-content:center;z-index:200;
}
#holeEnd.on{display:flex;}
.heBox{
  background:var(--bg);border:1px solid rgba(255,255,255,.1);
  border-radius:14px;padding:36px 44px;text-align:center;min-width:260px;
}
.heHole{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.heScore{font-size:64px;font-weight:900;line-height:1;margin-bottom:4px;}
.heLabel{font-size:18px;font-weight:700;margin-bottom:22px;}
.heNext{background:var(--lime);border:none;border-radius:8px;color:#060d06;
  font-size:14px;font-weight:800;padding:12px 32px;cursor:pointer;letter-spacing:.3px;}
.heNext:hover{background:#72d488;}
.eagle{color:#6eb4ff;} .birdie{color:var(--lime);} .par_{color:var(--text);}
.bogey{color:var(--gold);} .double_{color:var(--red);}

/* ── putting overlay (hint when on green) ── */
#greenHint{
  position:absolute;top:68px;left:72px;
  background:rgba(110,180,255,.1);backdrop-filter:blur(12px);
  border:1px solid rgba(110,180,255,.25);border-radius:var(--r);
  padding:10px 16px;font-size:12px;color:#aad4ff;z-index:100;display:none;
}
#greenHint.on{display:block;}

/* ── loader ── */
#loader{
  position:absolute;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:300;transition:opacity .8s;
}
#loader.gone{opacity:0;pointer-events:none;}
.lt{font-size:24px;font-weight:800;color:var(--lime);letter-spacing:-.8px;margin-bottom:18px;}
.dots{display:flex;gap:7px;}
.d{width:7px;height:7px;border-radius:50%;background:var(--green);}
.d:nth-child(1){animation:p 1.2s .0s infinite}
.d:nth-child(2){animation:p 1.2s .2s infinite}
.d:nth-child(3){animation:p 1.2s .4s infinite}
@keyframes p{0%,100%{opacity:.2;transform:scale(.75)}50%{opacity:1;transform:scale(1)}}
.lsub{font-size:12px;color:var(--muted);margin-top:12px;}
</style>
</head>
<body>

<div id="loader">
  <div class="lt">⛳ Pebble Beach Simulator</div>
  <div class="dots"><div class="d"></div><div class="d"></div><div class="d"></div></div>
  <div class="lsub" id="lsub">Loading photorealistic terrain...</div>
</div>

<div id="cc"></div>
<div id="holeList"></div>

<!-- top HUD -->
<div id="hud">
  <div class="hHole" id="hHole">H1</div>
  <div class="hDiv"></div>
  <div><div class="hName" id="hName">First Light</div><div class="hDesc" id="hDesc">Pebble Beach Golf Links</div></div>
  <div class="hSpc"></div>
  <div class="hStat"><div class="hSV" id="hStrokes">0</div><div class="hSL">Strokes</div></div>
  <div class="hDiv"></div>
  <div class="hStat"><div class="hSV" id="hScore">E</div><div class="hSL">Total</div></div>
  <div class="hDiv"></div>
  <div id="hPar" class="parB par4">Par 4</div>
  <div class="hDiv"></div>
  <button id="mapBtn" onclick="toggleOverlay()" style="background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;font-weight:600;padding:6px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;">🗺 Map</button>
</div>

<!-- flight card -->
<div id="flightCard">
  <div class="cr"><span class="cl">Club</span><span class="cv" id="fcClub">—</span></div>
  <div class="cr"><span class="cl">Ball Speed</span><span class="cv" id="fcBs">—</span></div>
  <div class="cr"><span class="cl">Launch</span><span class="cv" id="fcLa">—</span></div>
  <div class="cr"><span class="cl">Spin</span><span class="cv" id="fcSp">—</span></div>
  <div class="cSep"></div>
  <div class="cr"><span class="cl">Carry</span><span class="cv" id="fcCy">—</span></div>
</div>

<!-- result card -->
<div id="resultCard">
  <div class="rcLabel" id="rcClub">—</div>
  <div><span class="rcBig" id="rcCarry">—</span><span class="rcUnit" id="rcUnit"> yds carry</span></div>
  <div class="cSep"></div>
  <div class="cr"><span class="cl">Offline</span><span class="cv" id="rcOff">—</span></div>
  <div class="cr"><span class="cl">Remaining</span><span class="cv" id="rcPin">—</span></div>
</div>

<!-- green hint -->
<div id="greenHint" id="greenHint">
  📍 On the green — use <strong>Simulate Putt</strong>
</div>

<!-- bottom shot panel -->
<div id="shotPanel">
  <div id="distBlock">
    <div class="dv" id="distVal">380</div>
    <div class="dl" id="distLbl">Yards to Pin</div>
  </div>
  <div class="pDiv"></div>
  <div id="clubRow"></div>
  <div class="pDiv"></div>
  <button class="actBtn" id="swingBtn" onclick="simShot()">🏌️ Simulate Shot</button>
  <button class="actBtn" id="puttBtn"  onclick="simPutt()">⛳ Simulate Putt</button>
</div>

<!-- hole complete -->
<div id="holeEnd">
  <div class="heBox">
    <div class="heHole" id="heHole">Hole 1 — First Light</div>
    <div class="heScore" id="heScore">4</div>
    <div class="heLabel" id="heLabel">Par</div>
    <button class="heNext" onclick="nextHole()">Next Hole →</button>
  </div>
</div>

<script>
// ─── Hole data ─────────────────────────────────────────────────────────────────
const HOLES = [
  {n:1, par:4, tee:{lat:36.5694064,lon:-121.9495065}, green:{lat:36.5705957,lon:-121.946136},  name:'First Light',      desc:'Uphill opener to the clifftop green'},
  {n:2, par:5, tee:{lat:36.5703434,lon:-121.9471006}, green:{lat:36.5695361,lon:-121.9419568}, name:'The Long Way Home', desc:'Sweeping par 5 along the Del Monte Forest'},
  {n:3, par:4, tee:{lat:36.5691802,lon:-121.9412614}, green:{lat:36.567456, lon:-121.9445025}, name:'The Long One',      desc:'Demanding par 4 with a narrow green complex'},
  {n:4, par:4, tee:{lat:36.567375, lon:-121.9439195}, green:{lat:36.5661856,lon:-121.9408725}, name:'Bomb & Gauge',      desc:'Downhill dogleg with ocean beginning to reveal'},
  {n:5, par:3, tee:{lat:36.5662451,lon:-121.9405788}, green:{lat:36.565041, lon:-121.9393316}, name:'Five',              desc:'Short par 3 with a deceiving green'},
  {n:6, par:5, tee:{lat:36.5660652,lon:-121.9378858}, green:{lat:36.5621649,lon:-121.9400159}, name:'Cliff Hanger',      desc:'Uphill par 5 — first glimpse of the Pacific'},
  {n:7, par:3, tee:{lat:36.5622499,lon:-121.940509},  green:{lat:36.5613496,lon:-121.9403736}, name:"Pebble's Gem",      desc:'The most photographed par 3 — postage-stamp green'},
  {n:8, par:4, tee:{lat:36.5613084,lon:-121.9401376}, green:{lat:36.5630512,lon:-121.936541},  name:'The Cape',          desc:'Dramatic cliffside drive over Stillwater Cove'},
  {n:9, par:4, tee:{lat:36.5635296,lon:-121.9368237}, green:{lat:36.560503, lon:-121.9330578}, name:'Fairway Nine',      desc:'Long par 4 hugging the headland'},
  {n:10,par:4, tee:{lat:36.5616586,lon:-121.9333905}, green:{lat:36.5579533,lon:-121.9314452}, name:'The Turn',          desc:'Back nine opens with a demanding downhill par 4'},
  {n:11,par:4, tee:{lat:36.5578602,lon:-121.9311173}, green:{lat:36.5607557,lon:-121.9295522}, name:'Eleven',            desc:'Uphill approach to a well-guarded green'},
  {n:12,par:3, tee:{lat:36.5609863,lon:-121.9290077}, green:{lat:36.5615036,lon:-121.9310677}, name:'Twelve',            desc:'Short par 3 with ocean backdrop'},
  {n:13,par:4, tee:{lat:36.5610391,lon:-121.9310449}, green:{lat:36.5630733,lon:-121.9347996}, name:'Thirteen',          desc:'Long par 4 back toward the coast'},
  {n:14,par:5, tee:{lat:36.5630653,lon:-121.935272},  green:{lat:36.5671059,lon:-121.9373125}, name:'Fourteen',          desc:'Reachable par 5 with a classic cypress run'},
  {n:15,par:4, tee:{lat:36.56711,  lon:-121.9369685}, green:{lat:36.5691552,lon:-121.9400933}, name:'Fifteen',           desc:'Uphill par 4 to a cliff-edge green'},
  {n:16,par:4, tee:{lat:36.5696326,lon:-121.9399552}, green:{lat:36.567831, lon:-121.9432687}, name:'Sixteen',           desc:'Downhill par 4 back toward the Lodge'},
  {n:17,par:3, tee:{lat:36.5671337,lon:-121.9440871}, green:{lat:36.5657924,lon:-121.9449169}, name:"The Quarry",        desc:"Jack's 1-iron in '72 — the most famous shot in golf"},
  {n:18,par:5, tee:{lat:36.5655406,lon:-121.9451694}, green:{lat:36.5676012,lon:-121.9496363}, name:'Final Challenge',   desc:'Finishing hole along Stillwater Cove'},
];
HOLES.forEach(h => {
  h.yds = Math.round(hvYds(h.tee.lat,h.tee.lon,h.green.lat,h.green.lon));
  h.hdg = brg(h.tee.lat,h.tee.lon,h.green.lat,h.green.lon);
});

// ─── Club data ─────────────────────────────────────────────────────────────────
const CLUBS = [
  {name:'Driver', short:'D',   yds:275,peak:42,side:14,ms:4800,bs:167,la:13,spin:2700},
  {name:'3-Wood', short:'3W',  yds:250,peak:38,side:11,ms:4400,bs:152,la:12,spin:3100},
  {name:'5-Wood', short:'5W',  yds:232,peak:35,side:10,ms:4100,bs:143,la:13,spin:3500},
  {name:'4-Iron', short:'4i',  yds:212,peak:32,side:9, ms:3900,bs:134,la:14,spin:4200},
  {name:'5-Iron', short:'5i',  yds:197,peak:30,side:8, ms:3700,bs:128,la:15,spin:5000},
  {name:'6-Iron', short:'6i',  yds:181,peak:28,side:8, ms:3500,bs:121,la:17,spin:5600},
  {name:'7-Iron', short:'7i',  yds:165,peak:26,side:7, ms:3300,bs:114,la:19,spin:6200},
  {name:'8-Iron', short:'8i',  yds:150,peak:24,side:6, ms:3100,bs:107,la:21,spin:6800},
  {name:'9-Iron', short:'9i',  yds:135,peak:22,side:5, ms:2900,bs:100,la:23,spin:7400},
  {name:'PW',     short:'PW',  yds:118,peak:26,side:5, ms:2700,bs:91, la:25,spin:8000},
  {name:'52°',    short:'52',  yds:100,peak:23,side:4, ms:2500,bs:82, la:29,spin:8500},
  {name:'56°',    short:'56',  yds:82, peak:19,side:4, ms:2300,bs:72, la:33,spin:9000},
  {name:'60°',    short:'60',  yds:62, peak:14,side:3, ms:2000,bs:60, la:37,spin:9500},
];

// ─── Geo utils ──────────────────────────────────────────────────────────────────
function brg(la1,lo1,la2,lo2){
  const f1=la1*Math.PI/180,f2=la2*Math.PI/180,dl=(lo2-lo1)*Math.PI/180;
  return((Math.atan2(Math.sin(dl)*Math.cos(f2),Math.cos(f1)*Math.sin(f2)-Math.sin(f1)*Math.cos(f2)*Math.cos(dl))*180/Math.PI)+360)%360;
}
function hvYds(la1,lo1,la2,lo2){
  const R=6371000,f1=la1*Math.PI/180,f2=la2*Math.PI/180;
  const a=Math.sin((la2-la1)*Math.PI/360)**2+Math.cos(f1)*Math.cos(f2)*Math.sin((lo2-lo1)*Math.PI/360)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))*1.09361;
}
function destLL(lat,lon,hdg,yds){
  const d=yds*0.9144/6371000,br=hdg*Math.PI/180,la1=lat*Math.PI/180,lo1=lon*Math.PI/180;
  const la2=Math.asin(Math.sin(la1)*Math.cos(d)+Math.cos(la1)*Math.sin(d)*Math.cos(br));
  const lo2=lo1+Math.atan2(Math.sin(br)*Math.sin(d)*Math.cos(la1),Math.cos(d)-Math.sin(la1)*Math.sin(la2));
  return{lat:la2*180/Math.PI,lon:lo2*180/Math.PI};
}

// ─── State ──────────────────────────────────────────────────────────────────────
let viewer=null, holeIdx=0, strokes=0, totalVsPar=0;
let scores=new Array(18).fill(null);
let ballLat, ballLon, ballH=0, pinLat, pinLon;
let clubIdx=0, busy=false, isOnGreen=false;
// Shared flythrough vars for ball animation
let _ftraj=[], _fstart=0, _fdur=1000;

const gKey=localStorage.getItem('golf_gkey')||'';
const cKey=localStorage.getItem('golf_ckey')||'';

// ─── Height sampling ────────────────────────────────────────────────────────────
async function groundH(lon,lat,fb=10){
  try{
    if(!viewer.scene.globe.show){
      const c=await viewer.scene.clampToHeightMostDetailed([Cesium.Cartesian3.fromDegrees(lon,lat,400)]);
      if(c[0]){const h=Cesium.Cartographic.fromCartesian(c[0]).height;if(isFinite(h)&&h>-100)return h;}
    }else{
      const p=[Cesium.Cartographic.fromDegrees(lon,lat)];
      const r=await Cesium.sampleTerrainMostDetailed(viewer.terrainProvider,p);
      if(r[0]&&isFinite(r[0].height))return r[0].height;
    }
  }catch(e){}
  return fb;
}

// ─── Build hole list ─────────────────────────────────────────────────────────────
function buildList(){
  const el=document.getElementById('holeList');
  HOLES.forEach((h,i)=>{
    if(i===9){const d=document.createElement('div');d.className='listDvd';el.appendChild(d);}
    const b=document.createElement('button');
    b.className='hBtn';b.id=`hb${i}`;
    b.innerHTML=`<span class="hNum">${h.n}</span><span class="hPar">P${h.par}</span>`;
    b.addEventListener('click',()=>{if(!busy)startHole(i);});
    el.appendChild(b);
  });
}

// ─── Club selector ───────────────────────────────────────────────────────────────
function buildClubs(){
  const r=document.getElementById('clubRow');r.innerHTML='';
  CLUBS.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='cBtn';b.id=`cb${i}`;b.textContent=c.short;b.title=`${c.name} ~${c.yds}y`;
    b.addEventListener('click',()=>selClub(i));
    r.appendChild(b);
  });
}
function selClub(i){
  clubIdx=i;
  document.querySelectorAll('.cBtn').forEach((b,j)=>b.classList.toggle('sel',j===i));
}
function suggestClub(yds){
  if(yds<55)return 12;if(yds<70)return 11;if(yds<88)return 10;if(yds<112)return 9;
  if(yds<128)return 8;if(yds<142)return 7;if(yds<157)return 6;if(yds<173)return 5;
  if(yds<188)return 4;if(yds<204)return 3;if(yds<223)return 2;if(yds<242)return 1;
  return 0;
}
function refreshDist(yds){
  const d=Math.round(yds);
  document.getElementById('distVal').textContent=d;
  document.getElementById('distLbl').textContent=isOnGreen?'Feet to Pin':'Yards to Pin';
  const sug=suggestClub(yds);
  document.querySelectorAll('.cBtn').forEach((b,j)=>{
    b.classList.remove('sug');
    if(j===sug)b.classList.add('sug');
  });
}

// ─── Camera ──────────────────────────────────────────────────────────────────────
async function shotCam(fromLat,fromLon,toLat,toLon,animate=true){
  const gh=await groundH(fromLon,fromLat,10);
  const dist=hvYds(fromLat,fromLon,toLat,toLon);
  const camH=gh+Math.max(28,Math.min(55,dist*0.13));
  await new Promise(r=>viewer.camera.flyTo({
    destination:Cesium.Cartesian3.fromDegrees(fromLon,fromLat,camH),
    orientation:{heading:Cesium.Math.toRadians(brg(fromLat,fromLon,toLat,toLon)),pitch:Cesium.Math.toRadians(-48),roll:0},
    duration:animate?2.0:0.4,
    easingFunction:Cesium.EasingFunction.QUADRATIC_IN_OUT,
    complete:r,cancel:r,
  }));
}
async function greenCam(animate=true){
  const gh=await groundH(pinLon,pinLat,10);
  await new Promise(r=>viewer.camera.flyTo({
    destination:Cesium.Cartesian3.fromDegrees(pinLon,pinLat,gh+16),
    orientation:{heading:Cesium.Math.toRadians(brg(ballLat,ballLon,pinLat,pinLon)),pitch:Cesium.Math.toRadians(-72),roll:0},
    duration:animate?2.5:0.5,
    easingFunction:Cesium.EasingFunction.QUADRATIC_IN_OUT,
    complete:r,cancel:r,
  }));
}

// ─── Trajectory builder ──────────────────────────────────────────────────────────
function buildTraj(sLat,sLon,sH,hdg,carryYds,offYds,peakM){
  const N=60,perp=(hdg+90)%360;
  return Array.from({length:N+1},(_,i)=>{
    const t=i/N;
    const fwd=destLL(sLat,sLon,hdg,carryYds*t);
    const fin=destLL(fwd.lat,fwd.lon,perp,offYds*t);
    return Cesium.Cartesian3.fromDegrees(fin.lon,fin.lat,sH+peakM*Math.sin(t*Math.PI)**1.3);
  });
}

// ─── Ball + arc entities (callback-driven, no clock juggling) ────────────────────
let ballE=null, arcE=null;
function initEntities(){
  ballE=viewer.entities.add({
    show:false,
    position:new Cesium.CallbackProperty(()=>{
      if(!_ftraj.length)return Cesium.Cartesian3.fromDegrees(-121.95,36.57,100);
      const t=Math.min((performance.now()-_fstart)/_fdur,1);
      return _ftraj[Math.min(Math.floor(t*(_ftraj.length-1)),_ftraj.length-1)];
    },false),
    point:{
      pixelSize:14,
      color:Cesium.Color.WHITE,
      outlineColor:Cesium.Color.fromCssColorString('rgba(255,255,140,0.9)'),
      outlineWidth:3,
      heightReference:Cesium.HeightReference.NONE,
      disableDepthTestDistance:Number.POSITIVE_INFINITY,
    }
  });
  arcE=viewer.entities.add({
    show:false,
    polyline:{
      positions:new Cesium.CallbackProperty(()=>_ftraj,false),
      width:2.5,
      material:new Cesium.PolylineGlowMaterialProperty({
        glowPower:0.3,
        color:Cesium.Color.fromCssColorString('rgba(255,255,160,0.82)'),
      }),
      depthFailMaterial:new Cesium.ColorMaterialProperty(
        Cesium.Color.fromCssColorString('rgba(255,255,160,0.3)')),
      clampToGround:false,
    }
  });
}

// ─── Animate flight ──────────────────────────────────────────────────────────────
async function doFlight(traj,ms,club,carry,offline){
  _ftraj=traj; _fdur=ms; _fstart=performance.now();
  ballE.show=true; arcE.show=true;

  // Show flight card
  document.getElementById('fcClub').textContent=club.name;
  document.getElementById('fcBs').textContent=`${club.bs} mph`;
  document.getElementById('fcLa').textContent=`${club.la}°`;
  document.getElementById('fcSp').textContent=`${club.spin.toLocaleString()} rpm`;
  document.getElementById('fcCy').textContent=`${Math.round(carry)} yds`;
  document.getElementById('flightCard').classList.add('on');

  await new Promise(r=>setTimeout(r,ms+200));

  ballE.show=false; arcE.show=false; _ftraj=[];
  document.getElementById('flightCard').classList.remove('on');
}

// ─── Shot generation ─────────────────────────────────────────────────────────────
function genShot(cidx,distYds){
  const c=CLUBS[cidx];
  // Smart distance: aim for the pin but cap at club max, add ±4% variance
  const aimed=Math.min(c.yds,distYds*0.97);
  const carry=Math.max(15,aimed*(0.96+Math.random()*0.08));
  const offline=(Math.random()-0.5)*2*c.side*(0.4+Math.random()*1.0);
  const peak=c.peak*(0.85+Math.random()*0.3);
  return{carry,offline,peak,ms:c.ms};
}

// ─── Simulate full shot ──────────────────────────────────────────────────────────
async function simShot(){
  if(busy||isOnGreen)return;
  busy=true;
  document.getElementById('swingBtn').disabled=true;
  document.getElementById('resultCard').classList.remove('on');

  const h=HOLES[holeIdx];
  const dist=hvYds(ballLat,ballLon,pinLat,pinLon);
  const hdg=brg(ballLat,ballLon,pinLat,pinLon);
  const club=CLUBS[clubIdx];
  const shot=genShot(clubIdx,dist);
  strokes++;
  document.getElementById('hStrokes').textContent=strokes;

  // Build + animate trajectory
  const traj=buildTraj(ballLat,ballLon,ballH,hdg,shot.carry,shot.offline,shot.peak);
  await doFlight(traj,shot.ms,club,shot.carry,shot.offline);

  // Compute landing
  const land=destLL(ballLat,ballLon,hdg,shot.carry);
  const final=destLL(land.lat,land.lon,(hdg+90)%360,shot.offline);
  ballLat=final.lat; ballLon=final.lon;
  ballH=await groundH(ballLon,ballLat,10);

  const remain=hvYds(ballLat,ballLon,pinLat,pinLon);
  const offDir=shot.offline>0?'R':'L';
  const offAbs=Math.abs(Math.round(shot.offline));

  // Result card
  document.getElementById('rcClub').textContent=club.name;
  document.getElementById('rcCarry').textContent=Math.round(shot.carry);
  document.getElementById('rcUnit').textContent=' yds carry';
  document.getElementById('rcOff').textContent=offAbs<1?'Straight':`${offAbs} yds ${offDir}`;
  document.getElementById('rcPin').textContent=remain<30?`${Math.round(remain*3)} ft`:`${Math.round(remain)} yds`;
  document.getElementById('resultCard').classList.add('on');
  setTimeout(()=>document.getElementById('resultCard').classList.remove('on'),4000);

  // Transition camera
  const nowOnGreen=remain<=25;
  if(nowOnGreen){
    isOnGreen=true;
    await greenCam(true);
    document.getElementById('swingBtn').style.display='none';
    document.getElementById('puttBtn').style.display='block';
    document.getElementById('greenHint').classList.add('on');
    refreshDist(remain*3); // show feet
  }else{
    await shotCam(ballLat,ballLon,pinLat,pinLon,true);
    const nc=suggestClub(remain);
    selClub(nc);
    refreshDist(remain);
    document.getElementById('swingBtn').disabled=false;
  }

  busy=false;
}

// ─── Simulate putt ────────────────────────────────────────────────────────────────
async function simPutt(){
  if(busy||!isOnGreen)return;
  busy=true;
  document.getElementById('puttBtn').disabled=true;
  document.getElementById('resultCard').classList.remove('on');

  const distYds=hvYds(ballLat,ballLon,pinLat,pinLon);
  const distFt=distYds*3;
  strokes++;
  document.getElementById('hStrokes').textContent=strokes;

  // Make probability: <5ft = 80%, 5-10ft = 50%, 10-20ft = 25%, >20ft = 10%
  const makeProb=distFt<5?0.80:distFt<10?0.50:distFt<20?0.25:0.10;
  const made=Math.random()<makeProb;

  const hdg=brg(ballLat,ballLon,pinLat,pinLon);

  if(made){
    // Animate putt rolling in
    const puttTraj=buildTraj(ballLat,ballLon,ballH+0.05,hdg,distYds,0,0.1);
    _ftraj=puttTraj;_fdur=1200;_fstart=performance.now();
    ballE.show=true;arcE.show=true;
    await new Promise(r=>setTimeout(r,1400));
    ballE.show=false;arcE.show=false;_ftraj=[];

    document.getElementById('rcClub').textContent='Putter — HOLED! ⛳';
    document.getElementById('rcCarry').textContent=Math.round(distFt);
    document.getElementById('rcUnit').textContent=' ft putt';
    document.getElementById('rcOff').textContent='—';
    document.getElementById('rcPin').textContent='In the hole!';
    document.getElementById('resultCard').classList.add('on');

    setTimeout(()=>{
      document.getElementById('resultCard').classList.remove('on');
      finishHole();
    },2500);
  }else{
    // Miss — ball ends up 1-4ft past or left/right
    const missCarry=distYds*(0.90+Math.random()*0.15);
    const missOff=(Math.random()-0.5)*4*(distFt/30);
    const land=destLL(ballLat,ballLon,hdg,missCarry);
    const fin=destLL(land.lat,land.lon,(hdg+90)%360,missOff);

    const puttTraj=buildTraj(ballLat,ballLon,ballH+0.05,hdg,missCarry,missOff,0.12);
    _ftraj=puttTraj;_fdur=1000;_fstart=performance.now();
    ballE.show=true;arcE.show=true;
    await new Promise(r=>setTimeout(r,1200));
    ballE.show=false;arcE.show=false;_ftraj=[];

    ballLat=fin.lat;ballLon=fin.lon;
    ballH=await groundH(ballLon,ballLat,ballH);

    const remainFt=hvYds(ballLat,ballLon,pinLat,pinLon)*3;
    document.getElementById('rcClub').textContent='Putter — Missed';
    document.getElementById('rcCarry').textContent=Math.round(remainFt);
    document.getElementById('rcUnit').textContent=` ft remaining`;
    document.getElementById('rcOff').textContent=Math.abs(Math.round(missOff*3))<1?'On line':`${Math.abs(Math.round(missOff*3))} ft ${missOff>0?'R':'L'}`;
    document.getElementById('rcPin').textContent=`${Math.round(remainFt)} ft`;
    document.getElementById('resultCard').classList.add('on');
    setTimeout(()=>document.getElementById('resultCard').classList.remove('on'),3500);

    refreshDist(remainFt);
    document.getElementById('puttBtn').disabled=false;
  }

  busy=false;
}

// ─── Finish hole ──────────────────────────────────────────────────────────────────
function finishHole(){
  const h=HOLES[holeIdx];
  const diff=strokes-h.par;
  scores[holeIdx]=strokes;
  totalVsPar+=diff;

  const LABELS=['Albatross','Eagle','Birdie','Par','Bogey','Double','Triple+'];
  const CLASSES=['eagle','eagle','birdie','par_','bogey','double_','double_'];
  const li=Math.min(Math.max(diff+3,0),6);

  document.getElementById('heHole').textContent=`Hole ${h.n} — ${h.name}`;
  document.getElementById('heScore').textContent=strokes;
  document.getElementById('heScore').className=`heScore ${CLASSES[li]}`;
  document.getElementById('heLabel').textContent=LABELS[li];
  document.getElementById('holeEnd').classList.add('on');

  const vs=totalVsPar===0?'E':totalVsPar>0?`+${totalVsPar}`:`${totalVsPar}`;
  document.getElementById('hScore').textContent=vs;
}
function nextHole(){
  document.getElementById('holeEnd').classList.remove('on');
  document.getElementById('resultCard').classList.remove('on');
  if(holeIdx<17)startHole(holeIdx+1);
}

// ─── Start hole ────────────────────────────────────────────────────────────────────
async function startHole(idx){
  busy=true;
  holeIdx=idx; strokes=0; isOnGreen=false;
  const h=HOLES[idx];
  pinLat=h.green.lat; pinLon=h.green.lon;
  ballLat=h.tee.lat;  ballLon=h.tee.lon;

  // Reset UI
  document.getElementById('hHole').textContent=`H${h.n}`;
  document.getElementById('hName').textContent=h.name;
  document.getElementById('hDesc').textContent='Pebble Beach Golf Links';
  document.getElementById('hStrokes').textContent='0';
  const pb=document.getElementById('hPar');pb.textContent=`Par ${h.par}`;pb.className=`parB par${h.par}`;
  document.querySelectorAll('.hBtn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.getElementById('swingBtn').style.display='block';
  document.getElementById('swingBtn').disabled=false;
  document.getElementById('puttBtn').style.display='none';
  document.getElementById('puttBtn').disabled=false;
  document.getElementById('greenHint').classList.remove('on');
  document.getElementById('resultCard').classList.remove('on');

  ballH=await groundH(ballLon,ballLat,10);
  const dist=hvYds(ballLat,ballLon,pinLat,pinLon);
  selClub(suggestClub(dist));
  refreshDist(dist);
  await shotCam(ballLat,ballLon,pinLat,pinLon,true);
  busy=false;
}

// ─── Keyboard shortcuts ────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(busy)return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown')startHole((holeIdx+1)%18);
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')  startHole((holeIdx+17)%18);
  if(e.key===' '){e.preventDefault();isOnGreen?simPutt():simShot();}
});

// ─── Course overlay ────────────────────────────────────────────────────────────
let courseMapData=null, overlayEntities=[], overlayOn=false;

async function loadCourseMap(){
  try{
    const r=await fetch('./pebble_beach_map.json');
    courseMapData=await r.json();
    console.log(`Course map: ${courseMapData.holes.length} holes loaded`);
  }catch(e){console.warn('pebble_beach_map.json not found:',e.message);}
}

function buildCourseOverlay(){
  if(!courseMapData||!viewer)return;
  for(const e of overlayEntities)viewer.entities.remove(e);
  overlayEntities=[];

  function ll2pos(ring){
    return Cesium.Cartesian3.fromDegreesArray(ring.flatMap(([la,lo])=>[lo,la]));
  }
  function addFill(pos,rgba){
    const e=viewer.entities.add({
      polygon:{
        hierarchy:new Cesium.PolygonHierarchy(pos),
        material:Cesium.Color.fromCssColorString(rgba),
        classificationType:Cesium.ClassificationType.BOTH,
        show:false,
      }
    });
    overlayEntities.push(e);
  }
  function addLine(pos,rgba,w=1.5){
    const e=viewer.entities.add({
      polyline:{
        positions:pos,
        width:w,
        material:new Cesium.ColorMaterialProperty(Cesium.Color.fromCssColorString(rgba)),
        clampToGround:true,
        show:false,
      }
    });
    overlayEntities.push(e);
  }

  for(const hole of courseMapData.holes){
    if(hole.fairwayPolygon){
      const p=ll2pos(hole.fairwayPolygon);
      addFill(p,'rgba(34,139,34,0.30)');
      addLine([...p,p[0]],'rgba(70,210,90,0.55)');
    }
    if(hole.greenPolygon){
      const p=ll2pos(hole.greenPolygon);
      addFill(p,'rgba(40,220,80,0.50)');
      addLine([...p,p[0]],'rgba(255,255,255,0.80)',2);
    }
    if(hole.teePolygon){
      const p=ll2pos(hole.teePolygon);
      addFill(p,'rgba(190,255,190,0.35)');
      addLine([...p,p[0]],'rgba(180,255,180,0.55)');
    }
    for(const b of hole.bunkers){
      addFill(ll2pos(b.polygon),'rgba(240,210,130,0.58)');
    }
    for(const w of hole.waterHazards){
      if(w.length>=3)addFill(ll2pos(w),'rgba(30,100,230,0.52)');
    }
  }

  // Cart paths
  for(const seg of courseMapData.cartPaths||[]){
    if(seg.length>=2)
      addLine(Cesium.Cartesian3.fromDegreesArray(seg.flatMap(([la,lo])=>[lo,la])),'rgba(215,215,195,0.65)',1.5);
  }

  // Woodland polygons
  for(const wood of courseMapData.woodlands||[]){
    if(wood.length>=3)addFill(ll2pos(wood),'rgba(20,80,20,0.32)');
  }

  console.log(`Overlay: ${overlayEntities.length} entities`);
}

function toggleOverlay(){
  overlayOn=!overlayOn;
  for(const e of overlayEntities)e.show=overlayOn;
  const btn=document.getElementById('mapBtn');
  btn.style.background=overlayOn?'rgba(90,186,110,0.18)':'transparent';
  btn.style.borderColor=overlayOn?'rgba(90,186,110,0.50)':'var(--border)';
  btn.style.color=overlayOn?'var(--lime)':'var(--muted)';
}

// ─── Cesium init ──────────────────────────────────────────────────────────────────
async function init(){
  if(cKey)Cesium.Ion.defaultAccessToken=cKey;

  viewer=new Cesium.Viewer('cc',{
    baseLayer:false,terrainProvider:new Cesium.EllipsoidTerrainProvider(),
    animation:false,baseLayerPicker:false,fullscreenButton:false,vrButton:false,
    geocoder:false,homeButton:false,infoBox:false,sceneModePicker:false,
    selectionIndicator:false,timeline:false,navigationHelpButton:false,
    projectionPicker:false,creditContainer:document.createElement('div'),
  });

  viewer.scene.globe.enableLighting=true;
  viewer.scene.skyAtmosphere.show=true;
  viewer.scene.fog.enabled=true;
  viewer.scene.fog.density=0.00010;
  viewer.scene.globe.showGroundAtmosphere=true;

  if(gKey){
    try{
      const tiles=await Cesium.Cesium3DTileset.fromUrl(
        `https://tile.googleapis.com/v1/3dtiles/root.json?key=${gKey}`,
        {maximumScreenSpaceError:2}
      );
      viewer.scene.primitives.add(tiles);
      viewer.scene.globe.show=false;
    }catch(e){console.warn('Google tiles:',e.message);}
  }
  if(cKey&&viewer.scene.globe.show!==false){
    try{
      viewer.terrainProvider=await Cesium.createWorldTerrainAsync({requestVertexNormals:true});
      viewer.imageryLayers.addImageryProvider(await Cesium.IonImageryProvider.fromAssetId(2));
    }catch(e){}
  }
  if(viewer.imageryLayers.length===0&&viewer.scene.globe.show!==false){
    try{
      viewer.imageryLayers.addImageryProvider(
        await Cesium.ArcGisMapServerImageryProvider.fromUrl(
          'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'));
    }catch(e){}
  }

  // Initial overview
  viewer.camera.setView({
    destination:Cesium.Cartesian3.fromDegrees(-121.9455,36.5645,1800),
    orientation:{heading:Cesium.Math.toRadians(340),pitch:Cesium.Math.toRadians(-45),roll:0},
  });

  initEntities();
  buildList();
  buildClubs();
  await loadCourseMap();
  buildCourseOverlay();

  let gone=false;
  function go(){
    if(gone)return;gone=true;
    document.getElementById('loader').classList.add('gone');
    startHole(0);
  }
  viewer.scene.globe.tileLoadProgressEvent.addEventListener(q=>{if(q===0)go();});
  setTimeout(go,8000);
}

init().catch(console.error);
</script>
