<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Course Mode Simulator – Aim Point Logic</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;height:100vh;background:#000;font-family:-apple-system,sans-serif;color:#fff}
#map{flex:1}
#sidebar{width:300px;background:#111;padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;font-size:13px}
h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#666;margin-bottom:4px}
.card{background:#1e1e1e;border-radius:10px;padding:12px}
.row{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0}
.label{color:#888;font-size:11px}
.val{font-weight:700;font-size:18px}
.val.hero{font-size:32px;color:#fff}
.val.small{font-size:13px}
.status{padding:4px 8px;border-radius:5px;font-size:11px;font-weight:700}
.status.on{background:#1a4a1a;color:#4f4}
.status.off{background:#4a1a1a;color:#f44}
.controls{display:flex;gap:8px}
button{flex:1;padding:9px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700}
#playBtn{background:#B89A5E;color:#000}
#resetBtn{background:#333;color:#fff}
.speed-row{display:flex;gap:8px;align-items:center;font-size:12px;color:#888}
input[type=range]{flex:1}
.progress{height:3px;background:#333;border-radius:2px;margin-top:4px}
.pfill{height:100%;background:#B89A5E;transition:width 0.1s;border-radius:2px}
.aim-item{padding:5px 0;border-bottom:1px solid #2a2a2a;display:flex;justify-content:space-between;align-items:center}
.dim{color:#555;font-size:11px}
.rule{background:#1a2a3a;border-radius:6px;padding:8px;font-size:11px;color:#7af;line-height:1.5}
</style>
</head>
<body>
<div id="map"></div>
<div id="sidebar">
  <div>
    <div style="font-size:16px;font-weight:900;color:#B89A5E">Berkshire Valley GC</div>
    <div style="font-size:11px;color:#555">Course Mode Aim Logic Simulator</div>
  </div>
  <div class="controls">
    <button id="playBtn" onclick="togglePlay()">▶ Play</button>
    <button id="resetBtn" onclick="reset()">↺ Reset</button>
  </div>
  <div class="speed-row">
    Speed <input type="range" id="spd" min="1" max="30" value="6" oninput="updateSpeed()">
    <span id="spdLbl">6x</span>
  </div>
  <div class="progress"><div class="pfill" id="prog"></div></div>

  <div class="card">
    <h3>Position</h3>
    <div class="row"><span class="label">Hole</span><span class="val" id="hNum">1</span></div>
    <div class="row"><span class="label">Par</span><span class="val small" id="hPar">4</span></div>
    <div class="row"><span class="label">Dist to green (C)</span><span class="val" id="distC">—</span><span class="dim">yd</span></div>
  </div>

  <div class="card">
    <h3>F / C / B Distances</h3>
    <div class="row"><span class="label">Front</span><span class="val small" id="dF">—</span><span class="dim">yd</span></div>
    <div class="row"><span class="label">Center</span><span class="val hero" id="dC">—</span><span class="dim">yd</span></div>
    <div class="row"><span class="label">Back</span><span class="val small" id="dB">—</span><span class="dim">yd</span></div>
  </div>

  <div class="card">
    <h3>Aim Points <span id="aimCount" class="status off">NONE</span></h3>
    <div id="aimList"></div>
    <div class="rule" id="ruleBox" style="margin-top:8px"></div>
  </div>

  <div class="card">
    <h3>Line Segments</h3>
    <div id="segList"></div>
  </div>
</div>

function activeAimPoints(hole, userPos){

function init(){
  map=L.map('map',{zoomControl:false}).setView([41.0090,-74.5060],16);
  L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{
    maxZoom:21,subdomains:['mt0','mt1','mt2','mt3']
  }).addTo(map);

  HOLES.forEach(h=>{
    const route=[h.tee,...h.path,h.green];
    L.polyline(route,{color:'rgba(255,255,255,0.2)',weight:1.5,dashArray:'3,3'}).addTo(map);
    L.circleMarker(h.tee,{radius:3,color:'#fff',fillColor:'#555',fillOpacity:1,weight:1.5}).addTo(map);
    L.circleMarker(h.green,{radius:5,color:AGREEN,fillColor:AGREEN,fillOpacity:1,weight:2}).addTo(map)
      .bindTooltip('H'+h.number,{permanent:true,direction:'top',offset:[0,-6],className:'htip'});
  });

  playerMarker=L.circleMarker(HOLES[0].waypoints[0],{
    radius:10,color:'#fff',fillColor:'#007AFF',fillOpacity:1,weight:3,zIndexOffset:1000
  }).addTo(map);

  updateDisplay();
}

function clearOverlays(){
  [...aimRings,...segLines,...segLabels].forEach(x=>x.remove());
  aimRings=[]; segLines=[]; segLabels=[];
}

function addSegment(a, b, color, dashes){
  const line=L.polyline([a,b],{color:'rgba(0,0,0,0.6)',weight:6}).addTo(map);
  const line2=L.polyline([a,b],{color,weight:3,dashArray:dashes||null}).addTo(map);
  const mid=[(a[0]+b[0])/2,(a[1]+b[1])/2];
  const yds=Math.round(distY(a,b));
  const label=L.marker(mid,{icon:L.divIcon({
    html:`<div style="background:rgba(0,0,0,0.75);color:#fff;font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap">${yds}y</div>`,
    iconAnchor:[20,10],className:''
  })}).addTo(map);
  segLines.push(line,line2); segLabels.push(label);
  return yds;
}

function updateDisplay(){
  if(idx>=totalWaypoints()) return;
  const {hole,pos}=currentHoleAndPos();
  const green=hole.green;

  playerMarker.setLatLng(pos);

  const dc=Math.round(distY(pos,green));
  const df=Math.round(dc*0.94), db=Math.round(dc*1.06);

  document.getElementById('hNum').textContent=hole.number;
  document.getElementById('hPar').textContent=hole.par;
  document.getElementById('distC').textContent=dc;
  document.getElementById('dF').textContent=df;
  document.getElementById('dC').textContent=dc;
  document.getElementById('dB').textContent=db;

  clearOverlays();
  const {pts, reason}=activeAimPoints(hole, pos);

  // Draw aim point rings
  pts.forEach((ap,i)=>{
    const ring=L.circleMarker(ap,{
      radius:14,color:'rgba(255,255,255,0.9)',fillColor:'rgba(255,255,255,0.15)',
      fillOpacity:1,weight:2.5,interactive:true
    }).addTo(map);
    L.circleMarker(ap,{radius:3,color:'#fff',fillColor:'#fff',fillOpacity:1,weight:1}).addTo(map);
    aimRings.push(ring);
  });

  // Draw line segments
  const waypoints_line=[pos,...pts,green];
  const segs=[];
  for(let i=0;i<waypoints_line.length-1;i++){
    const yds=addSegment(waypoints_line[i],waypoints_line[i+1],
      i===0&&!pts.length?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.9)', null);
    segs.push({from:i===0?'User':i<=pts.length?`Aim ${i}`:null, to:i<pts.length?`Aim ${i+1}`:'Green', yds});
  }

  // Update sidebar
  const aimBadge=document.getElementById('aimCount');
  aimBadge.textContent=pts.length?pts.length+' ACTIVE':'NONE';
  aimBadge.className='status '+(pts.length?'on':'off');

  const aimList=document.getElementById('aimList');
  if(pts.length){
    aimList.innerHTML=pts.map((ap,i)=>{
      const d=Math.round(distY(pos,ap)), dg=Math.round(distY(ap,green));
      return `<div class="aim-item"><span>Aim ${i+1}</span><span class="dim">${d}y from you · ${dg}y to green</span></div>`;
    }).join('');
  } else {
    aimList.innerHTML='<div class="dim" style="padding:4px 0">No aim points</div>';
  }
  document.getElementById('ruleBox').textContent='Rule: '+reason;

  const segList=document.getElementById('segList');
  segList.innerHTML=segs.map(s=>`<div class="aim-item"><span>${s.from||'·'} → ${s.to}</span><span class="dim">${s.yds}y</span></div>`).join('');

  const prog=idx/Math.max(1,totalWaypoints()-1)*100;
  document.getElementById('prog').style.width=prog+'%';
}

function totalWaypoints(){
  return HOLES.reduce((s,h)=>s+h.waypoints.length,0);
}

function currentHoleAndPos(){
  let rem=idx;
  for(const h of HOLES){
    if(rem<h.waypoints.length) return {hole:h, pos:h.waypoints[rem]};
    rem-=h.waypoints.length;
  }
  const last=HOLES[HOLES.length-1];
  return {hole:last, pos:last.waypoints[last.waypoints.length-1]};
}

function step(){
  const total=totalWaypoints();
  if(idx<total-1){ idx++; updateDisplay(); }
  else { playing=false; document.getElementById('playBtn').textContent='▶ Play'; clearInterval(timer); }
  const {pos}=currentHoleAndPos();
  if(idx%8===0) map.panTo(pos,{animate:true,duration:0.2});
}

function togglePlay(){
  playing=!playing;
  document.getElementById('playBtn').textContent=playing?'⏸ Pause':'▶ Play';
  if(playing){ timer=setInterval(step,Math.max(40,1200/speed)); }
  else clearInterval(timer);
}
function reset(){ clearInterval(timer); playing=false; idx=0; userAimOverrides={};
  document.getElementById('playBtn').textContent='▶ Play';
  updateDisplay(); map.setView([41.0090,-74.5060],16); }
function updateSpeed(){ speed=parseInt(document.getElementById('spd').value);
  document.getElementById('spdLbl').textContent=speed+'x';
  if(playing){clearInterval(timer);timer=setInterval(step,Math.max(40,1200/speed));} }

window.onload=init;
</script>
<style>.htip{background:transparent!important;border:none!important;box-shadow:none!important;color:#B89A5E;font-weight:700;font-size:11px}</style>
</body>
</html>
