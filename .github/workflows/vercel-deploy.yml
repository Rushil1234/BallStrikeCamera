name: Deploy Website to Vercel

# Auto-deploys the Website/ app to Vercel production on every push to rushil.
# Requires one repo secret: VERCEL_TOKEN (Settings -> Secrets and variables -> Actions).
# Org/Project IDs are identifiers (not secrets) for the existing "truecarry" project.

on:
  push:
    branches: [rushil]
    paths:
      - "Website/**"
      - ".github/workflows/vercel-deploy.yml"
  workflow_dispatch: {}

env:
  VERCEL_ORG_ID: team_FflKzjldUf27lXbTT6gZfasI
  VERCEL_PROJECT_ID: prj_J4K9jPaH1GErRFCar3EJ35d6LVqE

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
